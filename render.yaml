services:
  - type: web
    name: epigenetic-clock-reasoning-bench
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm ci && npm run build
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Set ANTHROPIC_API_KEY in the Render dashboard (Environment tab).
      # /api/explain falls back to a static blurb if it's missing.
